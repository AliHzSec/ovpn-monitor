<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitoring — Login</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reddit+Mono:wght@200..900&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #070b0f;
            --surface: #0e1520;
            --surface2: #131d2b;
            --border: #1c2a3a;
            --border2: #243348;
            --green: #22c55e;
            --green-glow: rgba(34, 197, 94, 0.15);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --danger-dim: rgba(239, 68, 68, 0.12);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
        }

        body {
            font-family: "Reddit Mono", monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle gradient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59, 130, 246, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(34, 197, 94, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Animated CSS grid lines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            animation: gridmove 25s linear infinite;
        }

        @keyframes gridmove {
            from { background-position: 0 0; }
            to { background-position: 48px 48px; }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.02) inset,
                0 24px 64px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(59, 130, 246, 0.04);
            animation: cardIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        /* Decorative gear icon top-right corner of card */
        .card-gear {
            position: absolute;
            top: 16px;
            right: 16px;
            color: var(--text-muted);
            opacity: 0.35;
            pointer-events: none;
        }

        /* Heading */
        h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 28px;
            line-height: 1.1;
        }

        /* Form fields */
        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px 10px 38px;
            font-family: "Reddit Mono", monospace;
            font-size: 14px;
            border-radius: 9px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px var(--green-glow);
        }

        input::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Eye toggle button */
        .eye-btn {
            position: absolute;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.15s;
        }

        .eye-btn:hover {
            color: var(--text);
        }

        /* Error box */
        .error {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--danger-dim);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-left: 3px solid var(--danger);
            color: #fca5a5;
            padding: 10px 14px;
            font-size: 13px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Submit button — green */
        .btn-submit {
            width: 100%;
            background: var(--green);
            border: none;
            color: #fff;
            padding: 12px;
            font-family: "Reddit Mono", monospace;
            font-size: 14px;
            font-weight: 700;
            border-radius: 9px;
            cursor: pointer;
            letter-spacing: -0.01em;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.25);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit:hover {
            background: #16a34a;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.35);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.2);
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 24px 24px;
                border-radius: 12px;
            }
            h1 { font-size: 28px; }
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- Decorative gear icon -->
        <svg class="card-gear" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>

        <h1>Hello</h1>

        {{if .Error}}
        <div class="error">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/panel/login">
            <div class="field">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" placeholder="admin" autofocus autocomplete="username">
                </div>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="eye-btn" id="eye-btn" aria-label="Toggle password visibility">
                        <svg id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-submit">Log In</button>
        </form>
    </div>

    <script>
        (function () {
            const eyeBtn = document.getElementById('eye-btn');
            const pwdInput = document.getElementById('password');
            const eyeOpen = document.getElementById('eye-open');
            const eyeClosed = document.getElementById('eye-closed');

            eyeBtn.addEventListener('click', function () {
                const isPass = pwdInput.type === 'password';
                pwdInput.type = isPass ? 'text' : 'password';
                eyeOpen.style.display = isPass ? 'none' : '';
                eyeClosed.style.display = isPass ? '' : 'none';
            });
        })();
    </script>
</body>

</html>
