<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitoring — Login</title>
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet"> -->
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #070b0f;
            --surface: #0e1520;
            --surface2: #131d2b;
            --border: #1c2a3a;
            --border2: #243348;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --accent-dim: rgba(59, 130, 246, 0.06);
            --green: #22c55e;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --danger-dim: rgba(239, 68, 68, 0.12);
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background noise + gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(34, 197, 94, 0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Grid lines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            animation: gridmove 25s linear infinite;
        }

        @keyframes gridmove {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 48px 48px;
            }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.02) inset,
                0 24px 64px rgba(0, 0, 0, 0.5),
                0 0 80px var(--accent-dim);
            animation: cardIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
            flex-shrink: 0;
        }

        .logo-info h1 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .logo-info p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 28px;
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
            color: var(--text);
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* Form elements */
        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 7px;
            letter-spacing: 0.01em;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
            display: flex;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 14px 11px 40px;
            font-family: sans-serif;
            font-size: 14px;
            border-radius: 9px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.04);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Error */
        .error {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--danger-dim);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-left: 3px solid var(--danger);
            color: #fca5a5;
            padding: 10px 14px;
            font-size: 13px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: shake 0.3s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 13px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 9px;
            cursor: pointer;
            letter-spacing: -0.01em;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: #2563eb;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
        }

        /* Mobile */
        @media (max-width: 480px) {
            .card {
                padding: 32px 24px;
                border-radius: 12px;
            }

            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">
            <div class="logo-info">
                <h1>Server Monitor</h1>
            </div>
        </div>
        <div class="divider"></div>

        <h2>Sign in</h2>
        <p class="subtitle">Enter your credentials to access the panel</p>

        {{if .Error}}
        <div class="error">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/panel/login">
            <div class="field">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" placeholder="admin" autofocus
                        autocomplete="username">
                </div>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                        autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-submit">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                    <polyline points="10 17 15 12 10 7" />
                    <line x1="15" y1="12" x2="3" y2="12" />
                </svg>
                Sign In
            </button>
        </form>
    </div>

</body>

</html>
