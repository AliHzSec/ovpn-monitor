<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitoring — Login</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Reddit+Mono:wght@200..900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d1117;
            --surface: rgba(22, 27, 39, 0.75);
            --surface2: rgba(28, 35, 51, 0.85);
            --border: rgba(45, 55, 72, 0.65);
            --border2: rgba(58, 74, 99, 0.9);
            --green: #22c55e;
            --green-glow: rgba(34, 197, 94, 0.18);
            --green-dim: rgba(34, 197, 94, 0.08);
            --text: #e2e8f0;
            --text-muted: #718096;
            --text-dim: #a0aec0;
            --danger: #ef4444;
            --danger-dim: rgba(239, 68, 68, 0.1);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.18);
            --glass-blur: blur(20px);
        }

        body {
            font-family: "Reddit Mono", monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* ── AMBIENT BACKGROUND ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 50% -5%, rgba(59, 130, 246, 0.09) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 15% 100%, rgba(34, 197, 94, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse 40% 30% at 85% 80%, rgba(59, 130, 246, 0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        /* animated grid */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            animation: gridmove 30s linear infinite;
        }

        @keyframes gridmove {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 40px 40px;
            }
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px 34px;
            width: 100%;
            max-width: 390px;
            backdrop-filter: var(--glass-blur);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 28px 72px rgba(0, 0, 0, 0.55),
                0 0 100px rgba(59, 130, 246, 0.05);
            animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* gradient top border */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            border-radius: 20px 20px 0 0;
            background: linear-gradient(90deg,
                    transparent 0%,
                    var(--accent) 30%,
                    var(--green) 70%,
                    transparent 100%);
            opacity: 0.8;
        }

        /* card hover: subtle glow intensify */
        .card:hover {
            border-color: var(--border2);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 28px 72px rgba(0, 0, 0, 0.55),
                0 0 120px rgba(59, 130, 246, 0.07);
            transition: box-shadow 0.4s, border-color 0.3s;
        }

        /* ── HEADER ── */
        .card-header {
            margin-bottom: 30px;
            animation: fadeUp 0.4s 0.1s ease backwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .card-brand {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 20px;
        }

        .card-brand-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: livepulse 2.5s ease-in-out infinite;
        }

        @keyframes livepulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 8px var(--green);
            }

            50% {
                opacity: 0.5;
                box-shadow: 0 0 4px var(--green);
            }
        }

        .card-brand-text {
            font-family: "Aldrich", sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        h1 {
            font-family: "Reddit Mono", monospace;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text);
            line-height: 1.1;
        }

        h1 .hello-dim {
            color: var(--text-muted);
            font-weight: 300;
        }

        .card-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            letter-spacing: 0.01em;
        }

        /* ── ERROR BOX ── */
        .error {
            display: flex;
            align-items: center;
            gap: 9px;
            background: var(--danger-dim);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-left: 3px solid var(--danger);
            color: #fca5a5;
            padding: 11px 14px;
            font-size: 12px;
            border-radius: 9px;
            margin-bottom: 20px;
            animation: shake 0.35s ease;
            backdrop-filter: blur(8px);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .error svg {
            flex-shrink: 0;
            color: var(--danger);
        }

        /* ── FORM ── */
        .field {
            margin-bottom: 16px;
            animation: fadeUp 0.4s ease backwards;
        }

        .field:nth-child(1) {
            animation-delay: 0.15s;
        }

        .field:nth-child(2) {
            animation-delay: 0.20s;
        }

        label {
            display: block;
            font-family: "Aldrich", sans-serif;
            font-size: 10px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 7px;
            transition: color 0.2s;
        }

        .field:focus-within label {
            color: var(--text-dim);
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            transition: color 0.2s;
        }

        .field:focus-within .input-icon {
            color: var(--green);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 12px 11px 38px;
            font-family: "Reddit Mono", monospace;
            font-size: 14px;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            backdrop-filter: blur(8px);
        }

        input:focus {
            border-color: var(--green);
            background: rgba(28, 35, 51, 0.95);
            box-shadow: 0 0 0 3px var(--green-glow);
        }

        input::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* eye toggle */
        .eye-btn {
            position: absolute;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            padding: 5px;
            border-radius: 5px;
            transition: color 0.15s, background 0.15s;
        }

        .eye-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        /* ── SUBMIT BUTTON ── */
        .btn-submit {
            width: 100%;
            position: relative;
            overflow: hidden;
            background: var(--green);
            border: none;
            color: #fff;
            padding: 13px;
            font-family: "Reddit Mono", monospace;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
            box-shadow: 0 4px 18px rgba(34, 197, 94, 0.28);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeUp 0.4s 0.25s ease backwards;
        }

        /* shimmer sweep on hover */
        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
            transition: left 0.4s ease;
            pointer-events: none;
        }

        .btn-submit:hover::after {
            left: 160%;
        }

        .btn-submit:hover {
            background: #16a34a;
            box-shadow: 0 6px 24px rgba(34, 197, 94, 0.38);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(34, 197, 94, 0.2);
        }

        .btn-submit svg {
            flex-shrink: 0;
        }

        /* ── FOOTER NOTE ── */
        .card-footer {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
            animation: fadeUp 0.4s 0.3s ease backwards;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .card {
                padding: 30px 22px 26px;
                border-radius: 16px;
            }

            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <div class="card">

        <div class="card-header">
            <div class="card-brand">
                <span class="card-brand-dot"></span>
                <span class="card-brand-text">Server Monitor</span>
            </div>
            <h1><span class="hello-dim">→ </span>Sign in</h1>
            <div class="card-subtitle">Enter your credentials to continue</div>
        </div>

        {{if .Error}}
        <div class="error">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/panel/login">

            <div class="field">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </span>
                    <input type="text" id="username" name="username" placeholder="admin" autofocus
                        autocomplete="username">
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </span>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                        autocomplete="current-password">
                    <button type="button" class="eye-btn" id="eye-btn" aria-label="Toggle password visibility">
                        <svg id="eye-open" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        <svg id="eye-closed" width="15" height="15" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                    <polyline points="10 17 15 12 10 7" />
                    <line x1="15" y1="12" x2="3" y2="12" />
                </svg>
                Log In
            </button>

        </form>

        <div class="card-footer">
            Monitoring &mdash; Restricted Access
        </div>

    </div>

    <script>
        (function () {
            var eyeBtn = document.getElementById('eye-btn');
            var pwdInput = document.getElementById('password');
            var eyeOpen = document.getElementById('eye-open');
            var eyeClosed = document.getElementById('eye-closed');

            eyeBtn.addEventListener('click', function () {
                var isPass = pwdInput.type === 'password';
                pwdInput.type = isPass ? 'text' : 'password';
                eyeOpen.style.display = isPass ? 'none' : '';
                eyeClosed.style.display = isPass ? '' : 'none';
            });
        })();
    </script>
</body>

</html>
